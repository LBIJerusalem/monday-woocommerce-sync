name: Sync WooCommerce to Monday

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install requests

      - run: python connect_woocommerce_monday_one-way.py
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
          WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
          WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
